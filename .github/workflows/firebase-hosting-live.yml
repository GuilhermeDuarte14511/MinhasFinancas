name: Publicar Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Publicar Data Connect e Flutter Web
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar credencial do Firebase
        id: firebase_credentials
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MINHASFINANCASOFC }}
        run: |
          if [[ -z "$FIREBASE_SERVICE_ACCOUNT" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::O secret FIREBASE_SERVICE_ACCOUNT_MINHASFINANCASOFC ainda não foi configurado. A publicação foi ignorada sem falhar o workflow."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Autenticar no Google Cloud
        if: steps.firebase_credentials.outputs.configured == 'true'
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MINHASFINANCASOFC }}
          project_id: minhasfinancasofc

      - name: Configurar Node.js
        if: steps.firebase_credentials.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar Firebase CLI
        if: steps.firebase_credentials.outputs.configured == 'true'
        run: npm install --global firebase-tools

      - name: Publicar Data Connect
        if: steps.firebase_credentials.outputs.configured == 'true'
        run: >-
          firebase deploy
          --only dataconnect
          --project minhasfinancasofc
          --non-interactive

      - name: Configurar Flutter
        if: steps.firebase_credentials.outputs.configured == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Instalar dependências Flutter
        if: steps.firebase_credentials.outputs.configured == 'true'
        run: flutter pub get

      - name: Gerar Flutter Web
        if: steps.firebase_credentials.outputs.configured == 'true'
        run: flutter build web --release

      - name: Publicar Firebase Hosting
        if: steps.firebase_credentials.outputs.configured == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MINHASFINANCASOFC }}
          projectId: minhasfinancasofc
          channelId: live

name: Format agent files

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Apply Dart formatting
        run: dart format lib/features/dashboard/presentation/app_shell.dart lib/features/finance/domain/loan_agenda_entry.dart lib/features/finance/presentation/agenda_page.dart lib/features/finance/presentation/loans_page.dart test/features/finance/loan_agenda_entry_test.dart
      - name: Commit formatted files
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Files are already formatted."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib test
          git commit -m "style: aplica formatação Dart"
          git push origin HEAD:${{ github.head_ref }}

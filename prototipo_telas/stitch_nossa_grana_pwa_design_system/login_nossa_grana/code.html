<style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-lg font-sans antialiased selection:bg-primary-container selection:text-on-primary-container">
<main class="w-full max-w-[420px] flex flex-col gap-2xl">
<!-- Header Section -->
<header class="flex flex-col items-center text-center gap-md">
<!-- Discreet Modern Logo representing union -->
<div class="w-16 h-16 rounded-2xl bg-surface-container-high flex items-center justify-center mb-sm shadow-[0px_4px_6px_-1px_rgba(15,23,42,0.05),0px_2px_4px_-2px_rgba(15,23,42,0.05)] border border-outline-variant/30">
<span class="material-symbols-outlined text-[32px] text-primary" data-icon="all_match" style="font-variation-settings: 'FILL' 1;">all_match</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg tracking-tight text-on-surface">
                Nossa Grana
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px]">
                A vida financeira de vocês, organizada em um só lugar.
            </p>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-lg w-full bg-surface p-xl rounded-2xl shadow-[0px_20px_25px_-5px_rgba(15,23,42,0.05),0px_8px_10px_-6px_rgba(15,23,42,0.02)] border border-outline-variant/50 relative overflow-hidden">
<!-- Subtle decorative gradient for humanistic touch -->
<div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-primary-container to-secondary-container"></div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">E-mail</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full h-[56px] pl-[48px] pr-lg rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface font-body-lg text-body-lg placeholder-outline/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" id="email" placeholder="exemplo@email.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Senha</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full h-[56px] pl-[48px] pr-[48px] rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface font-body-lg text-body-lg placeholder-outline/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" id="password" placeholder="••••••••" type="password"/>
<button aria-label="Mostrar senha" class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors flex items-center justify-center p-1 rounded-full focus:outline-none focus:bg-surface-container" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility" id="visibility-icon">visibility</span>
</button>
</div>
<div class="flex justify-end mt-sm">
<a class="font-label-md text-label-md text-primary hover:text-on-primary-fixed-variant transition-colors underline-offset-4 hover:underline" href="#">
                        Esqueci minha senha
                    </a>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-md mt-sm">
<button class="w-full h-[52px] rounded-xl bg-primary-container text-on-primary-container font-label-lg text-label-lg flex items-center justify-center shadow-[0px_4px_6px_-1px_rgba(15,23,42,0.1)] hover:shadow-lg hover:-translate-y-[1px] active:translate-y-[1px] active:shadow-sm transition-all duration-200" type="submit">
                    Entrar
                </button>
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-outline-variant/60"></div>
<span class="flex-shrink-0 mx-md text-outline font-label-md text-label-md">ou</span>
<div class="flex-grow border-t border-outline-variant/60"></div>
</div>
<button class="w-full h-[52px] rounded-xl bg-surface-container-lowest border border-outline-variant text-on-surface font-label-lg text-label-lg flex items-center justify-center gap-md hover:bg-surface-container-low transition-colors duration-200 shadow-sm" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Entrar com Google
                </button>
</div>
</form>
<!-- Footer -->
<footer class="text-center mt-md">
<p class="font-body-md text-body-md text-on-surface-variant">
                Ainda não tem uma conta? 
                <a class="font-label-lg text-label-lg text-primary hover:text-on-primary-fixed-variant transition-colors ml-xs" href="#">
                    Criar conta
                </a>
</p>
</footer>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibility-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility';
            }
        }
    </script>
</body></html>

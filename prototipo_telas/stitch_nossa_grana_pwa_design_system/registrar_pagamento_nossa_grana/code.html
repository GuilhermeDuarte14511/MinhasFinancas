<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>

<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="bg-background text-on-background antialiased pt-16 pb-[calc(5rem+env(safe-area-inset-bottom))] md:pb-0 min-h-screen flex flex-col font-body-md">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-lg h-16 bg-surface dark:bg-background border-b border-outline-variant dark:border-outline">
<div class="flex items-center gap-sm">
<button aria-label="Go back" class="p-2 -ml-2 rounded-full text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-95 duration-200 md:hidden">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-high hidden md:block">
<img alt="Couple profile photo" class="w-full h-full object-cover" data-alt="A small, circular profile picture of a young, modern couple smiling brightly in a sunlit outdoor setting. The light is warm and inviting, fitting a collaborative financial app context." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC_uKHoucYuu9InHzzN2nGzrMslbEdMkzeMdKLmlhy2iVrDMr8vCDe3YMZJBEvswaUjyngRHCAiuSvNNE2M2yhbYXcwozhJmPsM_iHXV8BC8PLcTE9ZAXSY_FPlMQnE470sys_XoXIud1bHOKUN-AhyLPu7wBE7IyAuMNYCwL17QSBeNjlnA7l-A73by0WTtKEHF44OWTXgMa270shUPWEJS1zJ_gwVDHPvpAWghHF2uftPLz0GcUY"/>
</div>
<h1 class="font-headline-md text-headline-md-mobile md:text-headline-md text-primary dark:text-primary-fixed-dim tracking-tight">Nossa Grana</h1>
</div>
<button aria-label="Notifications" class="w-10 h-10 flex items-center justify-center rounded-full text-primary dark:text-primary-fixed-dim hover:bg-surface-container-low transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-[24px]" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow max-w-3xl mx-auto w-full px-container-margin-mobile md:px-container-margin-desktop py-lg md:py-xl flex flex-col gap-lg md:gap-xl">
<!-- Screen Header -->
<div class="flex flex-col gap-xs mb-sm">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface">Registrar Pagamento</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Fatura Cartão Nubank - Venc. 15 Out</p>
</div>
<!-- Payment Summary Bento Card -->
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-lg shadow-[0px_4px_6px_-1px_rgba(15,23,42,0.05),0px_2px_4px_-2px_rgba(15,23,42,0.05)] relative overflow-hidden">
<!-- Decorative gradient orb -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-primary/10 rounded-full blur-2xl"></div>
<div class="flex flex-col gap-md relative z-10">
<div class="flex justify-between items-end border-b border-outline-variant pb-md">
<div>
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Total da fatura</p>
<p class="font-headline-md text-headline-md text-on-surface mt-1">R$ 2.342,70</p>
</div>
<div class="text-right">
<p class="font-label-md text-label-md text-on-surface-variant">Valor já pago</p>
<p class="font-body-lg text-body-lg text-secondary font-medium mt-1">R$ 500,00</p>
</div>
</div>
<div class="pt-sm flex justify-between items-center">
<div>
<p class="font-label-md text-label-md text-on-surface-variant">Saldo pendente</p>
<p class="font-title-lg text-title-lg text-error mt-1">R$ 1.842,70</p>
</div>
<div class="h-10 w-10 rounded-full bg-error-container text-on-error-container flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]">warning</span>
</div>
</div>
</div>
</div>
<!-- Payment Input Section -->
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-lg shadow-[0px_4px_6px_-1px_rgba(15,23,42,0.05),0px_2px_4px_-2px_rgba(15,23,42,0.05)] flex flex-col gap-lg">
<!-- Value Input -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface" for="payment-amount">Qual valor você deseja pagar?</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 font-title-lg text-title-lg text-on-surface-variant">R$</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 font-title-lg text-title-lg text-on-surface transition-all outline-none" id="payment-amount" inputmode="decimal" placeholder="0,00" type="text" value="1.000,00"/>
</div>
<button class="self-start mt-2 font-label-md text-label-md text-primary hover:text-primary-container transition-colors flex items-center gap-1 active:scale-95" onclick="document.getElementById('payment-amount').value='1.842,70'" type="button">
<span class="material-symbols-outlined text-[16px]">bolt</span>
                    Pagar valor total pendente
                </button>
</div>
<hr class="border-t border-outline-variant"/>
<!-- Date and User -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface">Data do pagamento</label>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 font-body-md text-body-md text-on-surface transition-all outline-none" type="date" value="2023-10-10"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface">Registrado por</label>
<div class="h-14 px-4 bg-surface-container rounded-lg border border-outline-variant flex items-center gap-sm">
<div class="w-6 h-6 rounded-full overflow-hidden bg-primary-container">
<img alt="User avatar" class="w-full h-full object-cover" data-alt="A very small, circular profile picture of one half of a modern couple, smiling. Soft, bright lighting, high quality." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBhn14y56RqdttvvuUYGV5xTs1r58Fcs04MTEm7WMRLjXXwCEiOlbKLlfo2gOs2gTjUehWuiM64TakSEhoAwW-Q-_4cuRCXtYWXxCs3W2ILhTLfIHJOB4ZQ8IXq7Qh2ji-AJ1Pudae8TW0paKvYYNLxcbDZ2Tl79ZoMGwXynvlVuIB0P3pn5JjWbJs0p_VZFzAp617gxAuawAvGm52jgyQHHF-rQR_bKLrGMUBvGj2ayOlRmwC4II0"/>
</div>
<span class="font-body-md text-body-md text-on-surface">João</span>
</div>
</div>
</div>
<!-- Preview Feedback -->
<div class="bg-surface-container-low rounded-lg p-md flex items-start gap-sm border border-outline-variant">
<span class="material-symbols-outlined text-secondary text-[20px] mt-0.5">info</span>
<p class="font-body-md text-body-md text-on-surface-variant">Após este pagamento, ainda restarão <strong class="text-on-surface font-semibold">R$ 842,70</strong> pendentes nesta fatura.</p>
</div>
</div>
<!-- Action Button -->
<div class="mt-auto pt-md flex justify-end">
<button class="w-full md:w-auto h-[52px] px-xl bg-primary text-on-primary font-label-lg text-label-lg rounded-full flex items-center justify-center gap-2 hover:bg-primary-container transition-colors shadow-sm active:scale-95">
<span class="material-symbols-outlined text-[20px]">check_circle</span>
                Confirmar pagamento
            </button>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe pt-2 h-20 bg-surface-container dark:bg-surface-container-highest shadow-[0px_-4px_6px_-1px_rgba(15,23,42,0.05)] rounded-t-xl">
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:bg-surface-container-high dark:hover:bg-inverse-surface rounded-full active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-md text-label-md mt-1">Início</span>
</button>
<button class="flex flex-col items-center justify-center bg-primary-container dark:bg-tertiary-container text-on-primary-container dark:text-on-tertiary-container rounded-full px-4 py-1 active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined icon-filled" data-icon="credit_card">credit_card</span>
<span class="font-label-md text-label-md mt-1">Cartões</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:bg-surface-container-high dark:hover:bg-inverse-surface rounded-full active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
<span class="font-label-md text-label-md mt-1">Novo</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:bg-surface-container-high dark:hover:bg-inverse-surface rounded-full active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
<span class="font-label-md text-label-md mt-1">Agenda</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:bg-surface-container-high dark:hover:bg-inverse-surface rounded-full active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
<span class="font-label-md text-label-md mt-1">Mais</span>
</button>
</nav>
</body></html>

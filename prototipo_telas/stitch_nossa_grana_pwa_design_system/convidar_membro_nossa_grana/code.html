<body class="bg-background text-on-background antialiased min-h-screen flex flex-col items-center justify-center p-lg">
<!-- Main Container -->
<main class="w-full max-w-md bg-surface border border-outline-variant rounded-2xl shadow-[0px_4px_6px_-1px_rgba(15,23,42,0.05),0px_2px_4px_-2px_rgba(15,23,42,0.05)] overflow-hidden flex flex-col h-[calc(100vh-48px)] max-h-[850px]">
<!-- Header / Illustration Area -->
<header class="w-full h-48 bg-primary-container relative flex items-center justify-center shrink-0">
<img class="absolute inset-0 w-full h-full object-cover opacity-90" data-alt="A modern, minimalist illustration of two abstract, stylized figures collaborating happily. They are shown arranging geometric shapes together, symbolizing shared financial goals and teamwork. The illustration uses a color palette predominantly featuring vibrant indigo, soft teal accents, and warm white backgrounds. The style is flat, corporate modern with a humanistic touch, conveying trust, harmony, and joint success in a bright, inviting atmosphere." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB6lr2_CXVUU8LxUjd-3bS9zzSnTqbx9aenKjyoEh7TRELYmjVPdnMbvV0GgeCgssVNz9kdPSIaTwqE-jfjRUzYsYqdQWiHQNHEtyjE-yvEG7NahPULNifFMKutSGmGujswOB3A46M5CgQ-5AjB6sy5Kt7fnwiFjoqkOijJu6NlPz8NeaVn-jZhPO8rkcSEtFhhlkoIY3842lwZU7EoqgMQuxE5mCW8D4WNXWBLgJpEi4UKHYopqjM"/>
<!-- Top App Bar Content -->
<div class="absolute top-0 left-0 w-full flex items-center p-md text-on-primary-container">
<button aria-label="Voltar" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
</div>
</header>
<!-- Content Area -->
<section class="flex-1 overflow-y-auto p-xl flex flex-col gap-lg relative z-10 bg-surface -mt-6 rounded-t-3xl">
<div class="text-center mb-sm">
<h1 class="font-headline-md text-headline-md text-on-background mb-xs">Convidar Membro</h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                    Convide alguém para gerenciar e acompanhar as finanças junto com você.
                </p>
</div>
<!-- Form -->
<form class="flex flex-col gap-lg mt-md" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface" for="email">E-mail do convidado</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full h-14 pl-12 pr-4 bg-white border border-outline-variant rounded-xl font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline/70" id="email" placeholder="exemplo@email.com" type="email"/>
</div>
</div>
<!-- Role Selector -->
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface">Permissão</label>
<div class="grid grid-cols-2 gap-md">
<!-- Editor Option -->
<label class="cursor-pointer relative">
<input checked="" class="peer sr-only" name="role" type="radio" value="editor"/>
<div class="h-auto p-md border-2 border-outline-variant rounded-xl flex flex-col items-start gap-sm peer-checked:border-primary peer-checked:bg-surface-container-low transition-all">
<div class="w-full flex justify-between items-center">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">edit_square</span>
<span class="material-symbols-outlined text-primary opacity-0 peer-checked:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div>
<h3 class="font-title-lg text-[16px] leading-[24px] font-semibold text-on-surface">Editor</h3>
<p class="font-label-md text-label-md text-on-surface-variant mt-1">Pode adicionar e editar transações.</p>
</div>
</div>
</label>
<!-- Reader Option -->
<label class="cursor-pointer relative">
<input class="peer sr-only" name="role" type="radio" value="reader"/>
<div class="h-auto p-md border-2 border-outline-variant rounded-xl flex flex-col items-start gap-sm peer-checked:border-primary peer-checked:bg-surface-container-low transition-all">
<div class="w-full flex justify-between items-center">
<span class="material-symbols-outlined text-outline">visibility</span>
<span class="material-symbols-outlined text-primary opacity-0 peer-checked:opacity-100 transition-opacity absolute right-4 top-4" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div>
<h3 class="font-title-lg text-[16px] leading-[24px] font-semibold text-on-surface">Leitura</h3>
<p class="font-label-md text-label-md text-on-surface-variant mt-1">Apenas visualiza os dados.</p>
</div>
</div>
</label>
</div>
<p class="font-body-md text-[13px] text-on-surface-variant mt-2 text-center bg-surface-container p-3 rounded-lg">
<span class="material-symbols-outlined text-[16px] align-middle mr-1 text-secondary">info</span>
                        Essa pessoa poderá acessar as informações compartilhadas de acordo com a permissão escolhida.
                    </p>
</div>
</form>
</section>
<!-- Actions / Footer -->
<footer class="p-xl bg-surface border-t border-outline-variant/30 flex flex-col gap-md shrink-0">
<button class="w-full h-[52px] bg-primary text-on-primary font-title-lg text-[16px] rounded-xl hover:bg-primary-fixed-variant hover:shadow-lg transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                Enviar convite
                <span class="material-symbols-outlined text-[20px]">send</span>
</button>
<button class="w-full h-[52px] bg-white border border-outline-variant text-on-surface font-title-lg text-[16px] rounded-xl hover:bg-surface-container-low transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">link</span>
                Copiar link de convite
            </button>
<button class="w-full py-2 text-primary font-label-lg text-label-lg hover:underline mt-sm">
                Convidar depois
            </button>
</footer>

# Purchases, invoices, installments and payments

mutation CreatePurchase(
  $spaceId: UUID!
  $cardId: UUID!
  $categoryId: UUID!
  $description: String!
  $merchantName: String
  $totalAmountCents: Int64!
  $purchaseDate: Date!
  $installmentCount: Int!
  $firstInvoiceReference: Date!
  $notes: String
) @auth(level: USER_EMAIL_VERIFIED) @transaction {
  query @redact {
    membership: spaceMember(first: {where: {financialSpaceId: {eq: $spaceId}, memberFirebaseUid: {eq_expr: "auth.uid"}, status: {eq: ACTIVE}}}) {
      role @check(expr: "this == 'OWNER' || this == 'EDITOR'", message: "Acesso somente para editores.")
    }
    card: creditCard(first: {where: {id: {eq: $cardId}, financialSpaceId: {eq: $spaceId}, status: {eq: ACTIVE}}}) @check(expr: "this != null", message: "Cartão inválido.") { id }
    category: category(first: {where: {id: {eq: $categoryId}, financialSpaceId: {eq: $spaceId}, archivedAt: {isNull: true}}}) @check(expr: "this != null", message: "Categoria inválida.") { id }
    me: userProfile(first: {where: {firebaseUid: {eq_expr: "auth.uid"}}}) { id }
  }
  purchase: purchase_insert(data: {
    financialSpaceId: $spaceId
    creditCardId: $cardId
    categoryId: $categoryId
    description: $description
    merchantName: $merchantName
    totalAmountCents: $totalAmountCents
    purchaseDate: $purchaseDate
    installmentCount: $installmentCount
    firstInvoiceReference: $firstInvoiceReference
    notes: $notes
    status: ACTIVE
    createdByUserId_expr: "response.query.me.id"
    updatedByUserId_expr: "response.query.me.id"
    updatedAt_expr: "request.time"
  })
  audit: auditEvent_insert(data: {
    financialSpaceId: $spaceId
    actorUserId_expr: "response.query.me.id"
    entityType: "purchase"
    entityId_expr: "response.purchase.id"
    action: "created"
    summary_expr: "'adicionou uma compra em ' + vars.description + '.'"
  })
}

query FindCreditCardInvoice($spaceId: UUID!, $cardId: UUID!, $referenceMonth: Date!)
@auth(level: USER_EMAIL_VERIFIED) {

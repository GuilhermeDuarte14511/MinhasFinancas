mutation UpdateNotificationRules(
  $spaceId: UUID!
  $invoiceClosing: Boolean!
  $invoiceDue: Boolean!
  $loanDue: Boolean!
  $daysBefore: Int!
) @auth(level: USER_EMAIL_VERIFIED) @transaction {
  query @redact {
    membership: spaceMember(first: {where: {financialSpaceId: {eq: $spaceId}, memberFirebaseUid: {eq_expr: "auth.uid"}, status: {eq: ACTIVE}}})
    @check(expr: "this != null", message: "Você não participa deste espaço.") { id }
    preference: notificationPreference(first: {where: {financialSpaceId: {eq: $spaceId}, userFirebaseUid: {eq_expr: "auth.uid"}}})
    @check(expr: "this != null", message: "Preferência não encontrada.") { id }
  }
  closing: notificationRule_update(
    first: {where: {notificationPreferenceId: {eq_expr: "response.query.preference.id"}, eventType: {eq: INVOICE_CLOSING}}}
    data: {enabled: $invoiceClosing, daysBefore: $daysBefore, updatedAt_expr: "request.time"}
  )
  due: notificationRule_update(
    first: {where: {notificationPreferenceId: {eq_expr: "response.query.preference.id"}, eventType: {eq: INVOICE_DUE}}}
    data: {enabled: $invoiceDue, daysBefore: $daysBefore, updatedAt_expr: "request.time"}
  )
  loan: notificationRule_update(
    first: {where: {notificationPreferenceId: {eq_expr: "response.query.preference.id"}, eventType: {eq: LOAN_INSTALLMENT_DUE}}}
    data: {enabled: $loanDue, daysBefore: $daysBefore, updatedAt_expr: "request.time"}
  )
}

mutation RegisterDeviceSubscription(

mutation CancelPurchaseInstallment(
  $spaceId: UUID!
  $installmentId: UUID!
  $invoiceId: UUID!
  $amountCents: Int64!
) @auth(level: USER_EMAIL_VERIFIED) @transaction {
  query @redact {
    membership: spaceMember(first: {where: {financialSpaceId: {eq: $spaceId}, memberFirebaseUid: {eq_expr: "auth.uid"}, status: {eq: ACTIVE}}}) {
      role @check(expr: "this == 'OWNER' || this == 'EDITOR'", message: "Acesso somente para editores.")
    }
    installment: purchaseInstallment(first: {where: {id: {eq: $installmentId}, invoiceId: {eq: $invoiceId}, financialSpaceId: {eq: $spaceId}, status: {ne: CANCELLED}}}) @check(expr: "this != null") {
      amountCents @check(expr: "this == vars.amountCents", message: "Valor da parcela divergente.")
    }
  }
  installment: purchaseInstallment_update(id: $installmentId, data: {
    status: CANCELLED
    updatedAt_expr: "request.time"
  })
  invoice: creditCardInvoice_update(id: $invoiceId, data: {
    totalAmountCents_update: {dec: $amountCents}
    updatedAt_expr: "request.time"
    version_update: {inc: 1}
  })
}

mutation CancelPurchase($spaceId: UUID!, $purchaseId: UUID!, $reason: String!)
@auth(level: USER_EMAIL_VERIFIED) @transaction {
  query @redact {
    membership: spaceMember(first: {where: {financialSpaceId: {eq: $spaceId}, memberFirebaseUid: {eq_expr: "auth.uid"}, status: {eq: ACTIVE}}}) {
      role @check(expr: "this == 'OWNER' || this == 'EDITOR'", message: "Acesso somente para editores.")
    }
    me: userProfile(first: {where: {firebaseUid: {eq_expr: "auth.uid"}}}) { id }
  }
  purchase: purchase_update(first: {where: {id: {eq: $purchaseId}, financialSpaceId: {eq: $spaceId}, status: {eq: ACTIVE}}}, data: {
    status: CANCELLED
    cancelledByUserId_expr: "response.query.me.id"
    cancelledAt_expr: "request.time"
    cancellationReason: $reason
    updatedByUserId_expr: "response.query.me.id"
    updatedAt_expr: "request.time"
    version_update: {inc: 1}
  }) @check(expr: "this != null", message: "Compra não encontrada.")
  installments: purchaseInstallment_updateMany(where: {purchaseId: {eq: $purchaseId}, financialSpaceId: {eq: $spaceId}}, data: {status: CANCELLED, updatedAt_expr: "request.time"})
  cashFlow: cashFlowEntry_updateMany(
    where: {financialSpaceId: {eq: $spaceId}, sourceType: {eq: "purchase"}, sourceEntityId: {eq: $purchaseId}, status: {eq: CONFIRMED}}
    data: {
      status: CANCELLED
      cancelledByUserId_expr: "response.query.me.id"
      cancelledAt_expr: "request.time"
      cancellationReason: $reason
      updatedByUserId_expr: "response.query.me.id"
      updatedAt_expr: "request.time"
      version_update: {inc: 1}
    }
  )
}

mutation RegisterInvoicePayment(
  $spaceId: UUID!
  $invoiceId: UUID!
  $accountId: UUID
  $amountCents: Int64!
  $paidAt: Timestamp!
  $notes: String
  $idempotencyKey: String!
  $resultingStatus: InvoiceStatus!
) @auth(level: USER_EMAIL_VERIFIED) @transaction {
  query @redact {
    membership: spaceMember(first: {where: {financialSpaceId: {eq: $spaceId}, memberFirebaseUid: {eq_expr: "auth.uid"}, status: {eq: ACTIVE}}}) {
      role @check(expr: "this == 'OWNER' || this == 'EDITOR'", message: "Acesso somente para editores.")
    }
    invoice: creditCardInvoice(first: {where: {id: {eq: $invoiceId}, financialSpaceId: {eq: $spaceId}, status: {ne: CANCELLED}}}) @check(expr: "this != null") {
      totalAmountCents
      paidAmountCents @check(expr: "vars.amountCents > 0 && vars.amountCents <= response.query.invoice.totalAmountCents - this", message: "Valor de pagamento inválido.")
    }
    account: financialAccount(first: {where: {id: {eq: $accountId}, financialSpaceId: {eq: $spaceId}, status: {eq: ACTIVE}}})
    @check(expr: "vars.accountId == null || this != null", message: "Conta inválida.") { id }
    me: userProfile(first: {where: {firebaseUid: {eq_expr: "auth.uid"}}}) { id }
  }
  payment: invoicePayment_insert(data: {
    financialSpaceId: $spaceId
    invoiceId: $invoiceId
    financialAccountId: $accountId
    amountCents: $amountCents
    paidAt: $paidAt
    notes: $notes
    status: CONFIRMED
    idempotencyKey: $idempotencyKey
    createdByUserId_expr: "response.query.me.id"
  })
  invoice: creditCardInvoice_update(id: $invoiceId, data: {
    paidAmountCents_update: {inc: $amountCents}
    status: $resultingStatus
    updatedAt_expr: "request.time"
    version_update: {inc: 1}
  })
  audit: auditEvent_insert(data: {
    financialSpaceId: $spaceId
    actorUserId_expr: "response.query.me.id"
    entityType: "invoice_payment"
    entityId_expr: "response.payment.id"
    action: "paid"
    summary: "registrou um pagamento de fatura."
  })
}


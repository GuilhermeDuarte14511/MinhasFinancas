# Identity

query GetMyProfile @auth(level: USER) {
  userProfiles(where: {firebaseUid: {eq_expr: "auth.uid"}}, limit: 1) {
    id
    firebaseUid
    email
    normalizedEmail
    displayName
    photoUrl
    locale
    timezone
  }
}

mutation CreateMyProfile($displayName: String!) @auth(level: USER) {
  userProfile_insert(
    data: {
      firebaseUid_expr: "auth.uid"
      email_expr: "auth.token.email"
      normalizedEmail_expr: "auth.token.email"
      displayName: $displayName
      updatedAt_expr: "request.time"
      lastSeenAt_expr: "request.time"
    }
  )
}

mutation UpdateMyProfile($displayName: String!, $photoUrl: String)
@auth(level: USER_EMAIL_VERIFIED) {
  userProfile_update(
    first: {where: {firebaseUid: {eq_expr: "auth.uid"}}}
    data: {
      displayName: $displayName
      photoUrl: $photoUrl
      updatedAt_expr: "request.time"
      lastSeenAt_expr: "request.time"
    }
  )
}

# Spaces and complete client projection

query ListMySpaces @auth(level: USER_EMAIL_VERIFIED) {
  spaceMembers(
    where: {
      memberFirebaseUid: {eq_expr: "auth.uid"}
      status: {eq: ACTIVE}
      removedAt: {isNull: true}
      financialSpace: {archivedAt: {isNull: true}}
    }
    orderBy: [{joinedAt: DESC}]
    limit: 20
  ) {
    id
    role
    joinedAt
    financialSpace {
      id
      name
      colorHex
      currencyCode
      timezone
      updatedAt
    }
  }
}

query GetWorkspaceSnapshot($spaceId: UUID!)
@auth(level: USER_EMAIL_VERIFIED) {
  access: spaceMember(
    first: {
      where: {
        financialSpaceId: {eq: $spaceId}
        memberFirebaseUid: {eq_expr: "auth.uid"}
        status: {eq: ACTIVE}
        removedAt: {isNull: true}
      }
    }
  ) @redact @check(expr: "this != null", message: "Você não participa deste espaço.") {
    id
  }

  financialSpace(id: $spaceId) {
    id
    name
    colorHex
    currencyCode
    timezone
    updatedAt
  }

  spaceMembers(
    where: {
      financialSpaceId: {eq: $spaceId}
      status: {in: [ACTIVE, INVITED]}
      removedAt: {isNull: true}
    }
    limit: 50
  ) {
    id
    memberFirebaseUid
    role
    status
    joinedAt
    user {
      id
      displayName
      email
      photoUrl
    }
  }

  categories(
    where: {financialSpaceId: {eq: $spaceId}, archivedAt: {isNull: true}}
    limit: 100
  ) {
    id
    name
    normalizedName
    icon
    colorHex
    isDefault
  }

  financialAccounts(
    where: {financialSpaceId: {eq: $spaceId}, status: {eq: ACTIVE}}
    orderBy: [{createdAt: ASC}]
    limit: 100
  ) {
    id
    name
    institutionName
    type
    openingBalanceCents
    openingBalanceAt
    colorHex
    includeInTotal
  }

  accountTransfers(
    where: {financialSpaceId: {eq: $spaceId}, status: {eq: CONFIRMED}}
    orderBy: [{transferredAt: DESC}]
    limit: 5000
  ) {
    id
    amountCents
    transferredAt
    notes
    fromAccount { id }
    toAccount { id }
  }

  monthlyBudgets(
    where: {financialSpaceId: {eq: $spaceId}}
    orderBy: [{referenceMonth: DESC}]
    limit: 240
  ) {
    id
    referenceMonth
    limitAmountCents
    category { id name }
  }

  creditCards(
    where: {financialSpaceId: {eq: $spaceId}, status: {eq: ACTIVE}}
    limit: 100
  ) {
    id
    nickname
    institutionName
    brand
    lastFourDigits
    creditLimitCents
    closingDay
    dueDay
    colorHex
    remindersEnabled
    status
    cardholderMember {
      id
      user {
        displayName
      }
    }
  }

  purchases(
    where: {financialSpaceId: {eq: $spaceId}, status: {eq: ACTIVE}}
    limit: 5000
  ) {
    id
    description
    merchantName
    totalAmountCents
    purchaseDate
    installmentCount
    firstInvoiceReference
    notes
    status
    creditCard { id }
    category { id name }
    createdByUser { id displayName }
  }

  cashFlowEntries(
    where: {financialSpaceId: {eq: $spaceId}, status: {ne: CANCELLED}}
    orderBy: [{occurredAt: DESC}]
    limit: 5000
  ) {
    id
    direction
    kind
    paymentMethod
    description
    amountCents
    occurredAt
    competenceMonth
    notes
    status
    occurrenceIndex
    isRecurrenceException
    receivedAt
    paidAt
    sourceType
    sourceEntityId
    category { id name }
    financialAccount { id }
    recurrenceSeries {
      id
      frequency
      startDate
      endDate
      preferredDay
      status
    }
    createdByUser { id displayName }
  }

  recurrenceSeries: cashFlowRecurrenceSeriess(
    where: {financialSpaceId: {eq: $spaceId}, status: {ne: CANCELLED}}
    orderBy: [{startDate: DESC}]
    limit: 500
  ) {
    id
    direction
    kind
    paymentMethod
    description
    amountCents
    notes
    frequency
    startDate
    endDate
    occurrenceLimit
    preferredDay
    nextOccurrenceDate
    status
    category { id name }
    financialAccount { id }
  }

  creditCardInvoices(
    where: {financialSpaceId: {eq: $spaceId}, status: {ne: CANCELLED}}
    limit: 300
  ) {
    id
    referenceMonth
    closingDate
    dueDate
    status
    totalAmountCents
    paidAmountCents
    creditCard { id nickname }
  }

  purchaseInstallments(
    where: {financialSpaceId: {eq: $spaceId}, status: {ne: CANCELLED}}
    limit: 1000
  ) {
    id
    installmentNumber
    installmentCount
    amountCents
    dueDate
    status
    purchase { id }
    invoice { id }
  }

  invoicePayments(
    where: {financialSpaceId: {eq: $spaceId}, status: {eq: CONFIRMED}}
    limit: 500
  ) {
    id
    amountCents
    paidAt
    notes
    status
    invoice { id }
    financialAccount { id }
    createdByUser { displayName }
  }

  loanPayments(
    where: {financialSpaceId: {eq: $spaceId}, status: {eq: CONFIRMED}}
    limit: 1000
  ) {
    id
    amountCents
    paidAt
    financialAccount { id }
  }

  loans(
    where: {financialSpaceId: {eq: $spaceId}, status: {ne: CANCELLED}}
    limit: 100
  ) {
    id
    name
    lender
    principalAmountCents
    monthlyInterestRateMicros
    amortizationMethod
    installmentCount
    contractedAt
    firstDueDate
    expectedInstallmentAmountCents
    notes
    status
    createdByUser { displayName }
  }

  loanInstallments(
    where: {financialSpaceId: {eq: $spaceId}, status: {ne: CANCELLED}}
    limit: 1000
  ) {
    id
    installmentNumber
    dueDate
    openingBalanceCents
    principalAmountCents
    interestAmountCents
    totalAmountCents
    paidAmountCents
    status
    loan { id }
  }

  notificationPreferences(
    where: {
      financialSpaceId: {eq: $spaceId}
      userFirebaseUid: {eq_expr: "auth.uid"}
    }
    limit: 1
  ) {
    id
    enabled
    pushEnabled
    inAppEnabled
    preferredTime
    timezone
  }

  notificationRules(
    where: {
      financialSpaceId: {eq: $spaceId}
      notificationPreference: {userFirebaseUid: {eq_expr: "auth.uid"}}
    }
    limit: 3
  ) {
    id
    eventType
    daysBefore
    enabled
  }

  auditEvents(
    where: {financialSpaceId: {eq: $spaceId}}
    orderBy: [{occurredAt: DESC}]
    limit: 50
  ) {
    id
    entityType
    entityId
    action
    summary
    occurredAt
    actorUser { displayName }
  }
}

query GetCashFlowSummary(
  $spaceId: UUID!
  $monthStart: Date!
  $yearStart: Date!
  $nextYearStart: Date!
  $monthStartedAt: Timestamp!
  $nextMonthStartedAt: Timestamp!
  $yearStartedAt: Timestamp!
  $nextYearStartedAt: Timestamp!
) @auth(level: USER_EMAIL_VERIFIED) {
  access: spaceMember(
    first: {
      where: {
        financialSpaceId: {eq: $spaceId}
        memberFirebaseUid: {eq_expr: "auth.uid"}
        status: {eq: ACTIVE}
        removedAt: {isNull: true}
      }
    }
  ) @redact @check(expr: "this != null", message: "Você não participa deste espaço.") {
    id
  }

  month: cashFlowEntries(
    where: {
      financialSpaceId: {eq: $spaceId}
      status: {in: [CONFIRMED, RECEIVED, PAID]}
      competenceMonth: {eq: $monthStart}
    }
  ) {
    direction
    amountCents_sum
  }

  year: cashFlowEntries(
    where: {
      financialSpaceId: {eq: $spaceId}
      status: {in: [CONFIRMED, RECEIVED, PAID]}
      competenceMonth: {ge: $yearStart, lt: $nextYearStart}
    }
  ) {
    direction
    amountCents_sum
  }

  lifetime: cashFlowEntries(
    where: {
      financialSpaceId: {eq: $spaceId}
      status: {in: [CONFIRMED, RECEIVED, PAID]}
    }
  ) {
    direction
    amountCents_sum
    competenceMonth_min
    competenceMonth_max
  }

  yearSeries: cashFlowEntries(
    where: {
      financialSpaceId: {eq: $spaceId}
      status: {in: [CONFIRMED, RECEIVED, PAID]}
      competenceMonth: {ge: $yearStart, lt: $nextYearStart}
    }
    orderBy: [{competenceMonth: ASC}]
  ) {
    competenceMonth
    direction
    amountCents_sum
  }

  monthPlanned: cashFlowEntries(
    where: {
      financialSpaceId: {eq: $spaceId}
      status: {eq: PLANNED}
      competenceMonth: {eq: $monthStart}
    }
  ) {
    direction
    amountCents_sum
  }

  yearPlanned: cashFlowEntries(
    where: {
      financialSpaceId: {eq: $spaceId}
      status: {eq: PLANNED}
      competenceMonth: {ge: $yearStart, lt: $nextYearStart}
    }
  ) {
    direction
    amountCents_sum
  }

  lifetimePlanned: cashFlowEntries(
    where: {financialSpaceId: {eq: $spaceId}, status: {eq: PLANNED}}
  ) {
    direction
    amountCents_sum
    competenceMonth_min
    competenceMonth_max
  }

  yearPlannedSeries: cashFlowEntries(
    where: {
      financialSpaceId: {eq: $spaceId}
      status: {eq: PLANNED}
      competenceMonth: {ge: $yearStart, lt: $nextYearStart}
    }
    orderBy: [{competenceMonth: ASC}]
  ) {
    competenceMonth
    direction
    amountCents_sum
  }

  cardMonth: creditCardInvoices(
    where: {
      financialSpaceId: {eq: $spaceId}
      status: {ne: CANCELLED}
      referenceMonth: {eq: $monthStart}
    }
  ) {
    totalAmountCents_sum
  }

  cardYear: creditCardInvoices(
    where: {
      financialSpaceId: {eq: $spaceId}
      status: {ne: CANCELLED}
      referenceMonth: {ge: $yearStart, lt: $nextYearStart}
    }
  ) {
    totalAmountCents_sum
  }

  cardLifetime: creditCardInvoices(
    where: {financialSpaceId: {eq: $spaceId}, status: {ne: CANCELLED}}
  ) {
    totalAmountCents_sum
    referenceMonth_min
    referenceMonth_max
  }

  cardYearSeries: creditCardInvoices(
    where: {
      financialSpaceId: {eq: $spaceId}
      status: {ne: CANCELLED}
      referenceMonth: {ge: $yearStart, lt: $nextYearStart}
    }
    orderBy: [{referenceMonth: ASC}]
  ) {
    referenceMonth
    totalAmountCents_sum
  }

  loanMonth: loanPayments(
    where: {
      financialSpaceId: {eq: $spaceId}
      status: {eq: CONFIRMED}
      paidAt: {ge: $monthStartedAt, lt: $nextMonthStartedAt}
    }
  ) {
    amountCents_sum
  }

  loanYear: loanPayments(
    where: {
      financialSpaceId: {eq: $spaceId}
      status: {eq: CONFIRMED}
      paidAt: {ge: $yearStartedAt, lt: $nextYearStartedAt}
    }
  ) {
    amountCents_sum
  }

  loanLifetime: loanPayments(
    where: {financialSpaceId: {eq: $spaceId}, status: {eq: CONFIRMED}}
  ) {
    amountCents_sum
    paidAt_min
    paidAt_max
  }

  loanYearSeries: loanPayments(
    where: {
      financialSpaceId: {eq: $spaceId}
      status: {eq: CONFIRMED}
      paidAt: {ge: $yearStartedAt, lt: $nextYearStartedAt}
    }
    orderBy: [{paidAt: ASC}]
  ) {
    paidAt
    amountCents_sum
  }
}

query GetAgendaEntries(
  $spaceId: UUID!
  $rangeStart: Timestamp!
  $rangeEnd: Timestamp!
  $rangeStartDate: Date!
  $rangeEndDate: Date!
) @auth(level: USER_EMAIL_VERIFIED) {
  access: spaceMember(
    first: {
      where: {
        financialSpaceId: {eq: $spaceId}
        memberFirebaseUid: {eq_expr: "auth.uid"}
        status: {eq: ACTIVE}
        removedAt: {isNull: true}
      }
    }
  ) @redact @check(expr: "this != null", message: "Você não participa deste espaço.") {
    id
  }

  cashFlowEntries(
    where: {
      financialSpaceId: {eq: $spaceId}
      status: {ne: CANCELLED}
      occurredAt: {ge: $rangeStart, lt: $rangeEnd}
    }
    orderBy: [{occurredAt: ASC}]
    limit: 5000
  ) {
    id
    direction
    kind
    paymentMethod
    description
    amountCents
    occurredAt
    competenceMonth
    notes
    status
    occurrenceIndex
    isRecurrenceException
    receivedAt
    paidAt
    category { id name icon colorHex }
    recurrenceSeries {
      id
      frequency
      preferredDay
      status
    }
  }

  creditCardInvoices(
    where: {
      financialSpaceId: {eq: $spaceId}
      status: {ne: CANCELLED}
      dueDate: {ge: $rangeStartDate, lt: $rangeEndDate}
    }
    orderBy: [{dueDate: ASC}]
    limit: 1000
  ) {
    id
    referenceMonth
    closingDate
    dueDate
    status
    totalAmountCents
    paidAmountCents
    creditCard { id nickname lastFourDigits colorHex }
  }

  purchaseInstallments(
    where: {
      financialSpaceId: {eq: $spaceId}
      status: {ne: CANCELLED}
      dueDate: {ge: $rangeStartDate, lt: $rangeEndDate}
    }
    orderBy: [{dueDate: ASC}]
    limit: 5000
  ) {
    id
    installmentNumber
    installmentCount
    amountCents
    dueDate
    status
    purchase {
      id
      description
      creditCard { id nickname lastFourDigits colorHex }
    }
    invoice { id referenceMonth status }
  }

  loanInstallments(
    where: {
      financialSpaceId: {eq: $spaceId}
      status: {ne: CANCELLED}
      dueDate: {ge: $rangeStartDate, lt: $rangeEndDate}
    }
    orderBy: [{dueDate: ASC}]
    limit: 2000
  ) {
    id
    installmentNumber
    dueDate
    totalAmountCents
    paidAmountCents
    status
    loan { id name lender status }
  }

  recurrenceSeries: cashFlowRecurrenceSeriess(
    where: {
      financialSpaceId: {eq: $spaceId}
      status: {eq: ACTIVE}
      startDate: {lt: $rangeEndDate}
    }
    orderBy: [{startDate: ASC}]
    limit: 500
  ) {
    id
    direction
    kind
    paymentMethod
    description
    amountCents
    notes
    frequency
    startDate
    endDate
    occurrenceLimit
    preferredDay
    nextOccurrenceDate
    status
    category { id name icon colorHex }
  }
}

mutation CreateFinancialSpace($name: String!, $colorHex: String!)
@auth(level: USER_EMAIL_VERIFIED)
@transaction {
  query @redact {
    me: userProfile(first: {where: {firebaseUid: {eq_expr: "auth.uid"}}})
    @check(expr: "this != null", message: "Perfil do usuário não encontrado.") {
      id
    }
  }

  space: financialSpace_insert(
    data: {
      name: $name
      colorHex: $colorHex
      createdByUserId_expr: "response.query.me.id"
      updatedAt_expr: "request.time"
    }
  )

  owner: spaceMember_insert(
    data: {
      financialSpaceId_expr: "response.space.id"
      userId_expr: "response.query.me.id"
      memberFirebaseUid_expr: "auth.uid"
      role: OWNER
      status: ACTIVE
      joinedAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  )

  market: category_insert(
    data: {
      financialSpaceId_expr: "response.space.id"
      name: "Mercado"
      normalizedName: "mercado"
      icon: "shopping_cart"
      colorHex: "#006A63"
      isDefault: true
      createdByUserId_expr: "response.query.me.id"
      updatedAt_expr: "request.time"
    }
  )
  home: category_insert(
    data: {
      financialSpaceId_expr: "response.space.id"
      name: "Casa"
      normalizedName: "casa"
      icon: "home"
      colorHex: "#3525CD"
      isDefault: true
      createdByUserId_expr: "response.query.me.id"
      updatedAt_expr: "request.time"
    }
  )
  food: category_insert(
    data: {
      financialSpaceId_expr: "response.space.id"
      name: "Alimentação"
      normalizedName: "alimentação"
      icon: "restaurant"
      colorHex: "#4F46E5"
      isDefault: true
      createdByUserId_expr: "response.query.me.id"
      updatedAt_expr: "request.time"
    }
  )
  transport: category_insert(
    data: {
      financialSpaceId_expr: "response.space.id"
      name: "Transporte"
      normalizedName: "transporte"
      icon: "directions_car"
      colorHex: "#3D37A9"
      isDefault: true
      createdByUserId_expr: "response.query.me.id"
      updatedAt_expr: "request.time"
    }
  )
  health: category_insert(
    data: {
      financialSpaceId_expr: "response.space.id"
      name: "Saúde"
      normalizedName: "saúde"
      icon: "health_and_safety"
      colorHex: "#006A63"
      isDefault: true
      createdByUserId_expr: "response.query.me.id"
      updatedAt_expr: "request.time"
    }
  )
  leisure: category_insert(
    data: {
      financialSpaceId_expr: "response.space.id"
      name: "Lazer"
      normalizedName: "lazer"
      icon: "movie"
      colorHex: "#777587"
      isDefault: true
      createdByUserId_expr: "response.query.me.id"
      updatedAt_expr: "request.time"
    }
  )
  subscriptions: category_insert(
    data: {
      financialSpaceId_expr: "response.space.id"
      name: "Assinaturas"
      normalizedName: "assinaturas"
      icon: "subscriptions"
      colorHex: "#4F46E5"
      isDefault: true
      createdByUserId_expr: "response.query.me.id"
      updatedAt_expr: "request.time"
    }
  )
  education: category_insert(
    data: {
      financialSpaceId_expr: "response.space.id"
      name: "Educação"
      normalizedName: "educação"
      icon: "school"
      colorHex: "#3D37A9"
      isDefault: true
      createdByUserId_expr: "response.query.me.id"
      updatedAt_expr: "request.time"
    }
  )
  other: category_insert(
    data: {
      financialSpaceId_expr: "response.space.id"
      name: "Outros"
      normalizedName: "outros"
      icon: "category"
      colorHex: "#777587"
      isDefault: true
      createdByUserId_expr: "response.query.me.id"
      updatedAt_expr: "request.time"
    }
  )

  preference: notificationPreference_insert(
    data: {
      financialSpaceId_expr: "response.space.id"
      userId_expr: "response.query.me.id"
      userFirebaseUid_expr: "auth.uid"
      enabled: true
      pushEnabled: false
      inAppEnabled: true
      updatedAt_expr: "request.time"
    }
  )
  closingRule: notificationRule_insert(
    data: {
      financialSpaceId_expr: "response.space.id"
      notificationPreferenceId_expr: "response.preference.id"
      eventType: INVOICE_CLOSING
      daysBefore: 3
      enabled: true
      updatedAt_expr: "request.time"
    }
  )
  dueRule: notificationRule_insert(
    data: {
      financialSpaceId_expr: "response.space.id"
      notificationPreferenceId_expr: "response.preference.id"
      eventType: INVOICE_DUE
      daysBefore: 3
      enabled: true
      updatedAt_expr: "request.time"
    }
  )
  loanRule: notificationRule_insert(
    data: {
      financialSpaceId_expr: "response.space.id"
      notificationPreferenceId_expr: "response.preference.id"
      eventType: LOAN_INSTALLMENT_DUE
      daysBefore: 3
      enabled: true
      updatedAt_expr: "request.time"
    }
  )
  audit: auditEvent_insert(
    data: {
      financialSpaceId_expr: "response.space.id"
      actorUserId_expr: "response.query.me.id"
      entityType: "financial_space"
      entityId_expr: "response.space.id"
      action: "created"
      summary_expr: "'criou o espaço ' + vars.name + '.'"
    }
  )
}

# Membership and invitations

query ListSpaceInvitations($spaceId: UUID!)
@auth(level: USER_EMAIL_VERIFIED) {
  access: spaceMember(first: {where: {financialSpaceId: {eq: $spaceId}, memberFirebaseUid: {eq_expr: "auth.uid"}, status: {eq: ACTIVE}}})
  @redact @check(expr: "this != null", message: "Você não participa deste espaço.") {
    role @check(
      expr: "this == 'OWNER' || this == 'EDITOR'"
      message: "Você não pode visualizar convites."
    )
  }
  spaceInvitations(
    where: {financialSpaceId: {eq: $spaceId}, status: {eq: PENDING}}
    limit: 50
  ) {
    id
    email
    role
    expiresAt
  }
}

mutation CreateSpaceInvitation(
  $spaceId: UUID!
  $email: String!
  $normalizedEmail: String!
  $role: MembershipRole!
  $tokenHash: String!
  $expiresAt: Timestamp!
) @auth(level: USER_EMAIL_VERIFIED) @transaction {
  query @redact {
    membership: spaceMember(
      first: {
        where: {
          financialSpaceId: {eq: $spaceId}
          memberFirebaseUid: {eq_expr: "auth.uid"}
          status: {eq: ACTIVE}
        }
      }
    ) @check(expr: "this != null", message: "Você não participa deste espaço.") {
      role @check(
        expr: "this == 'OWNER' || this == 'EDITOR'"
        message: "Você não pode convidar membros."
      )
    }
    me: userProfile(first: {where: {firebaseUid: {eq_expr: "auth.uid"}}}) {
      id
    }
  }
  invitation: spaceInvitation_insert(
    data: {
      financialSpaceId: $spaceId
      email: $email
      normalizedEmail: $normalizedEmail
      role: $role
      tokenHash: $tokenHash
      status: PENDING
      expiresAt: $expiresAt
      invitedByUserId_expr: "response.query.me.id"
      updatedAt_expr: "request.time"
    }
  )
  audit: auditEvent_insert(
    data: {
      financialSpaceId: $spaceId
      actorUserId_expr: "response.query.me.id"
      entityType: "space_invitation"
      entityId_expr: "response.invitation.id"
      action: "invited"
      summary_expr: "'convidou ' + vars.email + ' para o espaço.'"
    }
  )
}

mutation AcceptSpaceInvitation($tokenHash: String!)
@auth(level: USER_EMAIL_VERIFIED)
@transaction {
  query @redact {
    invitation: spaceInvitation(
      first: {where: {tokenHash: {eq: $tokenHash}, status: {eq: PENDING}}}
    ) @check(expr: "this != null", message: "Convite inválido ou já utilizado.") {
      id
      normalizedEmail @check(
        expr: "this == auth.token.email"
        message: "Este convite pertence a outro e-mail."
      )
      expiresAt @check(
        expr: "this > request.time"
        message: "Este convite expirou."
      )
      role
      financialSpace { id }
      invitedByUser { id }
    }
    me: userProfile(first: {where: {firebaseUid: {eq_expr: "auth.uid"}}}) {
      id
    }
  }
  member: spaceMember_insert(
    data: {
      financialSpaceId_expr: "response.query.invitation.financialSpace.id"
      userId_expr: "response.query.me.id"
      memberFirebaseUid_expr: "auth.uid"
      role_expr: "response.query.invitation.role"
      status: ACTIVE
      invitedByUserId_expr: "response.query.invitation.invitedByUser.id"
      joinedAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  )
  invitation: spaceInvitation_update(
    first: {where: {tokenHash: {eq: $tokenHash}, status: {eq: PENDING}}}
    data: {
      status: ACCEPTED
      acceptedByUserId_expr: "response.query.me.id"
      acceptedAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  )
  preference: notificationPreference_insert(
    data: {
      financialSpaceId_expr: "response.query.invitation.financialSpace.id"
      userId_expr: "response.query.me.id"
      userFirebaseUid_expr: "auth.uid"
      updatedAt_expr: "request.time"
    }
  )
  closingRule: notificationRule_insert(data: {
    financialSpaceId_expr: "response.query.invitation.financialSpace.id"
    notificationPreferenceId_expr: "response.preference.id"
    eventType: INVOICE_CLOSING
    daysBefore: 3
    enabled: true
  })
  dueRule: notificationRule_insert(data: {
    financialSpaceId_expr: "response.query.invitation.financialSpace.id"
    notificationPreferenceId_expr: "response.preference.id"
    eventType: INVOICE_DUE
    daysBefore: 3
    enabled: true
  })
  loanRule: notificationRule_insert(data: {
    financialSpaceId_expr: "response.query.invitation.financialSpace.id"
    notificationPreferenceId_expr: "response.preference.id"
    eventType: LOAN_INSTALLMENT_DUE
    daysBefore: 3
    enabled: true
  })
  audit: auditEvent_insert(
    data: {
      financialSpaceId_expr: "response.query.invitation.financialSpace.id"
      actorUserId_expr: "response.query.me.id"
      entityType: "space_member"
      entityId_expr: "response.member.id"
      action: "joined"
      summary: "entrou no espaço por convite."
    }
  )
}


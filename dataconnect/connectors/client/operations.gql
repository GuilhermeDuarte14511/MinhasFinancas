mutation CreateAccountTransfer(
  $spaceId: UUID!
  $fromAccountId: UUID!
  $toAccountId: UUID!
  $amountCents: Int64!
  $transferredAt: Timestamp!
  $notes: String
  $idempotencyKey: String!
) @auth(level: USER_EMAIL_VERIFIED) @transaction {
  query @redact {
    membership: spaceMember(first: {where: {financialSpaceId: {eq: $spaceId}, memberFirebaseUid: {eq_expr: "auth.uid"}, status: {eq: ACTIVE}}}) {
      role @check(expr: "(this == 'OWNER' || this == 'EDITOR') && vars.amountCents > 0 && vars.fromAccountId != vars.toAccountId", message: "Acesso ou transferência inválida.")
    }
    origin: financialAccount(first: {where: {id: {eq: $fromAccountId}, financialSpaceId: {eq: $spaceId}, status: {eq: ACTIVE}}})
      @check(expr: "this != null", message: "Conta de origem inválida.") { id }
    destination: financialAccount(first: {where: {id: {eq: $toAccountId}, financialSpaceId: {eq: $spaceId}, status: {eq: ACTIVE}}})
      @check(expr: "this != null", message: "Conta de destino inválida.") { id }
    me: userProfile(first: {where: {firebaseUid: {eq_expr: "auth.uid"}}}) { id }
  }
  transfer: accountTransfer_insert(data: {
    financialSpaceId: $spaceId
    fromAccountId: $fromAccountId
    toAccountId: $toAccountId
    amountCents: $amountCents
    transferredAt: $transferredAt
    notes: $notes
    status: CONFIRMED
    idempotencyKey: $idempotencyKey
    createdByUserId_expr: "response.query.me.id"
    updatedAt_expr: "request.time"
  })
  audit: auditEvent_insert(data: {
    financialSpaceId: $spaceId
    actorUserId_expr: "response.query.me.id"
    entityType: "account_transfer"
    entityId_expr: "response.transfer.id"
    action: "created"
    summary: "registrou uma transferência entre contas."
  })
}


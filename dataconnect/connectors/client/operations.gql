      kind
      paymentMethod
      description
      amountCents
      notes
      category { id }
      financialAccount { id }
    }
    me: userProfile(first: {where: {firebaseUid: {eq_expr: "auth.uid"}}}) { id }
  }
  entry: cashFlowEntry_insert(data: {
    financialSpaceId: $spaceId
    categoryId_expr: "response.query.series.category.id"
    financialAccountId_expr: "response.query.series.financialAccount.id"
    direction_expr: "response.query.series.direction"
    kind_expr: "response.query.series.kind"
    paymentMethod_expr: "response.query.series.paymentMethod"
    description_expr: "response.query.series.description"
    amountCents_expr: "response.query.series.amountCents"
    occurredAt: $occurredAt
    competenceMonth: $competenceMonth
    notes_expr: "response.query.series.notes"
    status: $status
    recurrenceSeriesId: $seriesId
    occurrenceIndex: $occurrenceIndex
    isRecurrenceException: false
    receivedAt: $receivedAt
    paidAt: $paidAt
    sourceType: "recurrence"
    sourceEntityId: $seriesId
    idempotencyKey: $idempotencyKey
    createdByUserId_expr: "response.query.me.id"
    updatedByUserId_expr: "response.query.me.id"
    updatedAt_expr: "request.time"
  })
  seriesProgress: cashFlowRecurrenceSeries_update(id: $seriesId, data: {
    nextOccurrenceDate: $nextOccurrenceDate
    updatedByUserId_expr: "response.query.me.id"
    updatedAt_expr: "request.time"

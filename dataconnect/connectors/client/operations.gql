  $tokenHash: String!
  $deviceName: String
) @auth(level: USER_EMAIL_VERIFIED) @transaction {
  query @redact {
    me: userProfile(first: {where: {firebaseUid: {eq_expr: "auth.uid"}}})
    @check(expr: "this != null", message: "Perfil não encontrado.") { id }
  }
  subscription: deviceSubscription_upsert(data: {
    id: $id
    userId_expr: "response.query.me.id"
    userFirebaseUid_expr: "auth.uid"
    platform: $platform
    tokenOrEndpoint: $tokenOrEndpoint
    tokenHash: $tokenHash
    deviceName: $deviceName
    enabled: true
    lastSeenAt_expr: "request.time"
    updatedAt_expr: "request.time"
  })
}

# Workspace, membership and catalog management

mutation UpdateFinancialSpace($spaceId: UUID!, $name: String!, $colorHex: String!)
@auth(level: USER_EMAIL_VERIFIED) @transaction {
  query @redact {
    membership: spaceMember(first: {where: {financialSpaceId: {eq: $spaceId}, memberFirebaseUid: {eq_expr: "auth.uid"}, status: {eq: ACTIVE}}}) {
      role @check(expr: "this == 'OWNER'", message: "Somente o proprietário pode editar o espaço.")
    }
  }
  space: financialSpace_update(id: $spaceId, data: {name: $name, colorHex: $colorHex, updatedAt_expr: "request.time", version_update: {inc: 1}})
}

mutation ArchiveFinancialSpace($spaceId: UUID!)
@auth(level: USER_EMAIL_VERIFIED) @transaction {
  query @redact {
    membership: spaceMember(first: {where: {financialSpaceId: {eq: $spaceId}, memberFirebaseUid: {eq_expr: "auth.uid"}, status: {eq: ACTIVE}}}) {
      role @check(expr: "this == 'OWNER'", message: "Somente o proprietário pode arquivar o espaço.")
    }
  }
  space: financialSpace_update(id: $spaceId, data: {archivedAt_expr: "request.time", updatedAt_expr: "request.time", version_update: {inc: 1}})
}

mutation RevokeSpaceInvitation($spaceId: UUID!, $invitationId: UUID!)
@auth(level: USER_EMAIL_VERIFIED) @transaction {
  query @redact {
    membership: spaceMember(first: {where: {financialSpaceId: {eq: $spaceId}, memberFirebaseUid: {eq_expr: "auth.uid"}, status: {eq: ACTIVE}}}) {
      role @check(expr: "this == 'OWNER' || this == 'EDITOR'", message: "Você não pode revogar convites.")
    }
  }
  invitation: spaceInvitation_update(first: {where: {id: {eq: $invitationId}, financialSpaceId: {eq: $spaceId}, status: {eq: PENDING}}}, data: {status: REVOKED, revokedAt_expr: "request.time", updatedAt_expr: "request.time"})
  @check(expr: "this != null", message: "Convite pendente não encontrado.")
}

mutation UpdateMemberRole($spaceId: UUID!, $memberId: UUID!, $role: MembershipRole!)
@auth(level: USER_EMAIL_VERIFIED) @transaction {
  query @redact {
    actor: spaceMember(first: {where: {financialSpaceId: {eq: $spaceId}, memberFirebaseUid: {eq_expr: "auth.uid"}, status: {eq: ACTIVE}}}) {
      role @check(expr: "this == 'OWNER'", message: "Somente o proprietário pode alterar papéis.")
    }
    target: spaceMember(first: {where: {id: {eq: $memberId}, financialSpaceId: {eq: $spaceId}, status: {eq: ACTIVE}}})
    @check(expr: "this != null", message: "Membro não encontrado.") { role }
    owners: spaceMembers(where: {financialSpaceId: {eq: $spaceId}, role: {eq: OWNER}, status: {eq: ACTIVE}}, limit: 2) { id }
  }
  member: spaceMember_update(id: $memberId, data: {role: $role, updatedAt_expr: "request.time", version_update: {inc: 1}})
  @check(expr: "vars.role == 'OWNER' || response.query.target.role != 'OWNER' || response.query.owners.size() > 1", message: "O espaço precisa manter um proprietário.")
}

mutation RemoveSpaceMember($spaceId: UUID!, $memberId: UUID!)
@auth(level: USER_EMAIL_VERIFIED) @transaction {
  query @redact {
    actor: spaceMember(first: {where: {financialSpaceId: {eq: $spaceId}, memberFirebaseUid: {eq_expr: "auth.uid"}, status: {eq: ACTIVE}}}) {
      role @check(expr: "this == 'OWNER'", message: "Somente o proprietário pode remover membros.")
    }
    target: spaceMember(first: {where: {id: {eq: $memberId}, financialSpaceId: {eq: $spaceId}, status: {eq: ACTIVE}}})
    @check(expr: "this != null", message: "Membro não encontrado.") { role memberFirebaseUid }
    owners: spaceMembers(where: {financialSpaceId: {eq: $spaceId}, role: {eq: OWNER}, status: {eq: ACTIVE}}, limit: 2) { id }
  }
  member: spaceMember_update(id: $memberId, data: {status: REMOVED, removedAt_expr: "request.time", updatedAt_expr: "request.time", version_update: {inc: 1}})
  @check(expr: "response.query.target.role != 'OWNER' || response.query.owners.size() > 1", message: "O último proprietário não pode ser removido.")
}

mutation UpdateCategory($spaceId: UUID!, $categoryId: UUID!, $name: String!, $normalizedName: String!)
@auth(level: USER_EMAIL_VERIFIED) @transaction {
  query @redact {
    membership: spaceMember(first: {where: {financialSpaceId: {eq: $spaceId}, memberFirebaseUid: {eq_expr: "auth.uid"}, status: {eq: ACTIVE}}}) { role @check(expr: "this == 'OWNER' || this == 'EDITOR'") }
  }
  category: category_update(first: {where: {id: {eq: $categoryId}, financialSpaceId: {eq: $spaceId}, archivedAt: {isNull: true}}}, data: {name: $name, normalizedName: $normalizedName, updatedAt_expr: "request.time", version_update: {inc: 1}})
}

mutation ArchiveCategory($spaceId: UUID!, $categoryId: UUID!)
@auth(level: USER_EMAIL_VERIFIED) @transaction {
  query @redact {
    membership: spaceMember(first: {where: {financialSpaceId: {eq: $spaceId}, memberFirebaseUid: {eq_expr: "auth.uid"}, status: {eq: ACTIVE}}}) { role @check(expr: "this == 'OWNER' || this == 'EDITOR'") }
  }
  category: category_update(first: {where: {id: {eq: $categoryId}, financialSpaceId: {eq: $spaceId}, isDefault: {eq: false}, archivedAt: {isNull: true}}}, data: {archivedAt_expr: "request.time", updatedAt_expr: "request.time", version_update: {inc: 1}})
  @check(expr: "this != null", message: "Categorias padrão não podem ser arquivadas.")
}

mutation UpdateCreditCard($spaceId: UUID!, $cardId: UUID!, $nickname: String!, $creditLimitCents: Int64!, $closingDay: Int!, $dueDay: Int!, $colorHex: String!)
@auth(level: USER_EMAIL_VERIFIED) @transaction {
  query @redact {
    membership: spaceMember(first: {where: {financialSpaceId: {eq: $spaceId}, memberFirebaseUid: {eq_expr: "auth.uid"}, status: {eq: ACTIVE}}}) { role @check(expr: "this == 'OWNER' || this == 'EDITOR'") }
    me: userProfile(first: {where: {firebaseUid: {eq_expr: "auth.uid"}}}) { id }
  }
  card: creditCard_update(first: {where: {id: {eq: $cardId}, financialSpaceId: {eq: $spaceId}, status: {eq: ACTIVE}}}, data: {nickname: $nickname, creditLimitCents: $creditLimitCents, closingDay: $closingDay, dueDay: $dueDay, colorHex: $colorHex, updatedByUserId_expr: "response.query.me.id", updatedAt_expr: "request.time", version_update: {inc: 1}})
}

mutation ArchiveCreditCard($spaceId: UUID!, $cardId: UUID!)
@auth(level: USER_EMAIL_VERIFIED) @transaction {
  query @redact {
    membership: spaceMember(first: {where: {financialSpaceId: {eq: $spaceId}, memberFirebaseUid: {eq_expr: "auth.uid"}, status: {eq: ACTIVE}}}) { role @check(expr: "this == 'OWNER' || this == 'EDITOR'") }
    me: userProfile(first: {where: {firebaseUid: {eq_expr: "auth.uid"}}}) { id }
  }
  card: creditCard_update(first: {where: {id: {eq: $cardId}, financialSpaceId: {eq: $spaceId}, status: {eq: ACTIVE}}}, data: {status: ARCHIVED, archivedAt_expr: "request.time", updatedByUserId_expr: "response.query.me.id", updatedAt_expr: "request.time", version_update: {inc: 1}})
}

mutation DeleteCreditCardCascade($spaceId: UUID!, $cardId: UUID!)
@auth(level: USER_EMAIL_VERIFIED) @transaction {
  query @redact {
    membership: spaceMember(first: {where: {financialSpaceId: {eq: $spaceId}, memberFirebaseUid: {eq_expr: "auth.uid"}, status: {eq: ACTIVE}, removedAt: {isNull: true}}}) {
      role @check(expr: "this == 'OWNER' || this == 'EDITOR'", message: "Acesso somente para editores.")
    }
    target: creditCard(first: {where: {id: {eq: $cardId}, financialSpaceId: {eq: $spaceId}}})
    @check(expr: "this != null", message: "Cartão não encontrado neste espaço.") {
      id
      nickname
    }
    me: userProfile(first: {where: {firebaseUid: {eq_expr: "auth.uid"}}}) { id }
  }

  directNotifications: notificationDelivery_deleteMany(
    where: {financialSpaceId: {eq: $spaceId}, entityType: {eq: "credit_card"}, entityId: {eq: $cardId}}
  )
  invoicePayments: invoicePayment_deleteMany(
    where: {financialSpaceId: {eq: $spaceId}, invoice: {creditCardId: {eq: $cardId}}}
  )
  installments: purchaseInstallment_deleteMany(
    where: {
      _and: [
        {financialSpaceId: {eq: $spaceId}}
        {_or: [
          {purchase: {creditCardId: {eq: $cardId}}}
          {invoice: {creditCardId: {eq: $cardId}}}
        ]}
      ]
    }
  )
  generatedCashFlow: cashFlowEntry_deleteMany(
    where: {financialSpaceId: {eq: $spaceId}, sourceType: {eq: "credit_card"}, sourceEntityId: {eq: $cardId}}
  )
  invoices: creditCardInvoice_deleteMany(
    where: {financialSpaceId: {eq: $spaceId}, creditCardId: {eq: $cardId}}
  )
  purchases: purchase_deleteMany(
    where: {financialSpaceId: {eq: $spaceId}, creditCardId: {eq: $cardId}}
  )
  card: creditCard_delete(
    first: {where: {id: {eq: $cardId}, financialSpaceId: {eq: $spaceId}}}
  ) @check(expr: "this != null", message: "Não foi possível excluir o cartão.")
  audit: auditEvent_insert(data: {
    financialSpaceId: $spaceId
    actorUserId_expr: "response.query.me.id"
    entityType: "credit_card"
    entityId: $cardId
    action: "deleted_cascade"
    summary_expr: "'excluiu permanentemente o cartão ' + response.query.target.nickname + ' e seus vínculos.'"
  })
}

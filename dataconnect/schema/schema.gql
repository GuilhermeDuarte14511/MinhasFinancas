  createdAt: Timestamp! @default(expr: "request.time")
}

type NotificationPreference
  @table(name: "notification_preference")
  @unique(fields: ["financialSpace", "user"])
  @unique(fields: ["financialSpace", "userFirebaseUid"])
  @index(fields: ["userFirebaseUid", "enabled"]) {
  id: UUID! @default(expr: "uuidV4()")
  financialSpace: FinancialSpace!
  user: UserProfile!
  userFirebaseUid: String! @col(dataType: "varchar(128)")
  enabled: Boolean! @default(value: true)
  pushEnabled: Boolean! @default(value: false)
  inAppEnabled: Boolean! @default(value: true)
  preferredTime: String! @default(value: "09:00") @col(dataType: "varchar(8)")
  timezone: String! @default(value: "America/Sao_Paulo") @col(dataType: "varchar(64)")
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  version: Int! @default(value: 1)
}

type NotificationRule
  @table(name: "notification_rule")
  @unique(fields: ["notificationPreference", "eventType"]) {
  id: UUID! @default(expr: "uuidV4()")
  financialSpace: FinancialSpace!
  notificationPreference: NotificationPreference!
  eventType: NotificationEventType!
  daysBefore: Int!
  enabled: Boolean! @default(value: true)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type DeviceSubscription
  @table(name: "device_subscription")
  @unique(fields: ["user", "tokenHash"])
  @index(fields: ["userFirebaseUid", "enabled"]) {
  id: UUID! @default(expr: "uuidV4()")
  user: UserProfile!
  userFirebaseUid: String! @col(dataType: "varchar(128)")
  platform: NotificationPlatform!
  tokenOrEndpoint: String! @col(dataType: "varchar(4096)")
  tokenHash: String! @col(dataType: "varchar(128)")
  deviceName: String @col(dataType: "varchar(160)")
  enabled: Boolean! @default(value: true)
  lastSeenAt: Timestamp
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  revokedAt: Timestamp
}

type NotificationDelivery
  @table(name: "notification_delivery")
  @index(fields: ["status", "scheduledFor"])
  @index(fields: ["financialSpaceId", "userId", "scheduledFor"]) {
  id: UUID! @default(expr: "uuidV4()")
  financialSpace: FinancialSpace!
  user: UserProfile!
  notificationRule: NotificationRule!
  entityType: String! @col(dataType: "varchar(80)")
  entityId: UUID!
  title: String! @col(dataType: "varchar(160)")
  body: String! @col(dataType: "varchar(500)")
  scheduledFor: Timestamp!
  channel: NotificationChannel!
  status: NotificationDeliveryStatus!
  attemptCount: Int! @default(value: 0)
  deduplicationKey: String! @unique @col(dataType: "varchar(180)")
  sentAt: Timestamp
  lastAttemptAt: Timestamp
  failureCode: String @col(dataType: "varchar(80)")
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type AuditEvent
  @table(name: "audit_event")
  @index(fields: ["financialSpaceId", "occurredAt"])
  @index(fields: ["actorUserId", "occurredAt"]) {
  id: UUID! @default(expr: "uuidV4()")
  financialSpace: FinancialSpace!
  actorUser: UserProfile!
  entityType: String! @col(dataType: "varchar(80)")
  entityId: UUID!
  action: String! @col(dataType: "varchar(80)")
  summary: String! @col(dataType: "varchar(500)")
  correlationId: String @col(dataType: "varchar(128)")
  occurredAt: Timestamp! @default(expr: "request.time")
}

enum MembershipRole {
  OWNER
  EDITOR
  VIEWER
}

enum MembershipStatus {
  INVITED
  ACTIVE
  SUSPENDED
  REMOVED
}

enum InvitationStatus {
  PENDING
  ACCEPTED
  REVOKED
  EXPIRED
}

enum CreditCardStatus {
  ACTIVE
  ARCHIVED
}

enum PurchaseStatus {
  ACTIVE
  CANCELLED
}

enum InstallmentStatus {
  PLANNED
  OPEN
  PAID
  CANCELLED
}

enum InvoiceStatus {
  OPEN
  CLOSED
  PARTIALLY_PAID
  PAID
  OVERDUE
  CANCELLED
}

enum PaymentStatus {
  CONFIRMED
  REVERSED
}

enum CashFlowDirection {
  INCOME
  EXPENSE
}

enum CashFlowKind {
  SALARY
  THIRTEENTH_SALARY
  VACATION_PAY
  BONUS
  REFUND
  BILL
  CASH_PURCHASE
  CARD_PURCHASE
  SUBSCRIPTION
  TAX
  LOAN_PAYMENT
  OTHER_INCOME
  OTHER_EXPENSE
}

enum CashFlowPaymentMethod {
  PIX
  CASH
  BANK_TRANSFER
  DEBIT_CARD
  CREDIT_CARD
  OTHER
}

enum CashFlowStatus {
  PLANNED
  CONFIRMED
  RECEIVED
  PAID
  CANCELLED
}

enum CashFlowRecurrenceFrequency {
  WEEKLY
  BIWEEKLY
  MONTHLY
  ANNUAL
}

enum CashFlowRecurrenceSeriesStatus {
  ACTIVE
  COMPLETED
  CANCELLED
}

enum CashFlowMutationScope {
  ONLY_THIS
  THIS_AND_FUTURE
  ENTIRE_SERIES
}

enum LoanStatus {
  ACTIVE
  PAID_OFF
  OVERDUE
  CANCELLED
}

enum LoanInstallmentStatus {
  PLANNED
  OPEN
  PARTIALLY_PAID
  PAID
  OVERDUE
  CANCELLED
}

enum LoanAmortizationMethod {
  PRICE
  SAC
  MANUAL
}

enum NotificationPlatform {
  ANDROID
  WEB
}

enum NotificationEventType {
  INVOICE_CLOSING
  INVOICE_DUE
  LOAN_INSTALLMENT_DUE
}

enum NotificationChannel {
  PUSH
  IN_APP
}

enum NotificationDeliveryStatus {
  PENDING
  PROCESSING
  SENT
  FAILED
  SKIPPED
}

type UserProfile @table(name: "user_profile") @index(fields: ["normalizedEmail"]) {
  id: UUID! @default(expr: "uuidV4()")
  firebaseUid: String! @unique @col(dataType: "varchar(128)")
  email: String! @col(dataType: "varchar(320)")
  normalizedEmail: String! @col(dataType: "varchar(320)")
  displayName: String! @col(dataType: "varchar(120)")
  photoUrl: String @col(dataType: "varchar(2048)")
  locale: String! @default(value: "pt_BR") @col(dataType: "varchar(16)")
  timezone: String! @default(value: "America/Sao_Paulo") @col(dataType: "varchar(64)")
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  lastSeenAt: Timestamp
}

type FinancialSpace @table(name: "financial_space") @index(fields: ["createdByUserId", "archivedAt"]) {
  id: UUID! @default(expr: "uuidV4()")
  name: String! @col(dataType: "varchar(120)")
  colorHex: String! @default(value: "#3525CD") @col(dataType: "char(7)")
  currencyCode: String! @default(value: "BRL") @col(dataType: "char(3)")
  timezone: String! @default(value: "America/Sao_Paulo") @col(dataType: "varchar(64)")
  createdByUser: UserProfile!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  archivedAt: Timestamp
  version: Int! @default(value: 1)
}

type SpaceMember
  @table(name: "space_member")
  @unique(fields: ["financialSpace", "user"])
  @unique(fields: ["financialSpace", "memberFirebaseUid"])
  @index(fields: ["memberFirebaseUid", "status"]) {
  id: UUID! @default(expr: "uuidV4()")
  financialSpace: FinancialSpace!
  user: UserProfile!
  memberFirebaseUid: String! @col(dataType: "varchar(128)")
  role: MembershipRole!
  status: MembershipStatus!
  invitedByUser: UserProfile
  joinedAt: Timestamp
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  removedAt: Timestamp
  version: Int! @default(value: 1)
}

type SpaceInvitation
  @table(name: "space_invitation")
  @index(fields: ["normalizedEmail", "status"])
  @index(fields: ["financialSpaceId", "status"]) {
  id: UUID! @default(expr: "uuidV4()")
  financialSpace: FinancialSpace!
  email: String! @col(dataType: "varchar(320)")
  normalizedEmail: String! @col(dataType: "varchar(320)")
  role: MembershipRole!
  tokenHash: String! @unique @col(dataType: "varchar(128)")
  status: InvitationStatus!
  expiresAt: Timestamp!
  invitedByUser: UserProfile!
  acceptedByUser: UserProfile
  acceptedAt: Timestamp
  revokedAt: Timestamp
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type Category
  @table(name: "category")
  @unique(fields: ["financialSpace", "normalizedName"])
  @index(fields: ["financialSpaceId", "archivedAt"]) {
  id: UUID! @default(expr: "uuidV4()")
  financialSpace: FinancialSpace!
  name: String! @col(dataType: "varchar(80)")
  normalizedName: String! @col(dataType: "varchar(80)")
  icon: String! @col(dataType: "varchar(80)")
  colorHex: String! @col(dataType: "char(7)")
  isDefault: Boolean! @default(value: false)
  createdByUser: UserProfile!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  archivedAt: Timestamp
  version: Int! @default(value: 1)
}

type CreditCard
  @table(name: "credit_card")
  @index(fields: ["financialSpaceId", "status"])
  @index(fields: ["cardholderMemberId", "status"]) {
  id: UUID! @default(expr: "uuidV4()")
  financialSpace: FinancialSpace!
  cardholderMember: SpaceMember!
  nickname: String! @col(dataType: "varchar(80)")
  institutionName: String @col(dataType: "varchar(120)")
  brand: String @col(dataType: "varchar(40)")
  lastFourDigits: String! @col(dataType: "char(4)")
  creditLimitCents: Int64!
  closingDay: Int!
  dueDay: Int!
  colorHex: String! @col(dataType: "char(7)")
  remindersEnabled: Boolean! @default(value: true)
  status: CreditCardStatus!
  createdByUser: UserProfile!
  updatedByUser: UserProfile!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  archivedAt: Timestamp
  version: Int! @default(value: 1)
}

type Purchase
  @table(name: "purchase")
  @index(fields: ["financialSpaceId", "status", "purchaseDate"])
  @index(fields: ["creditCardId", "status", "purchaseDate"]) {
  id: UUID! @default(expr: "uuidV4()")
  financialSpace: FinancialSpace!
  creditCard: CreditCard!
  category: Category!
  description: String! @col(dataType: "varchar(180)")
  merchantName: String @col(dataType: "varchar(180)")
  totalAmountCents: Int64!
  purchaseDate: Date!
  installmentCount: Int!
  firstInvoiceReference: Date!
  notes: String @col(dataType: "varchar(1000)")
  status: PurchaseStatus!
  createdByUser: UserProfile!
  updatedByUser: UserProfile!
  cancelledByUser: UserProfile
  cancelledAt: Timestamp
  cancellationReason: String @col(dataType: "varchar(500)")
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  version: Int! @default(value: 1)
}

type CreditCardInvoice
  @table(name: "credit_card_invoice")
  @unique(fields: ["creditCard", "referenceMonth"])
  @index(fields: ["financialSpaceId", "dueDate", "status"]) {
  id: UUID! @default(expr: "uuidV4()")
  financialSpace: FinancialSpace!
  creditCard: CreditCard!
  referenceMonth: Date!
  closingDate: Date!
  dueDate: Date!
  status: InvoiceStatus!
  totalAmountCents: Int64! @default(value: 0)
  paidAmountCents: Int64! @default(value: 0)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  closedAt: Timestamp
  version: Int! @default(value: 1)
}

type PurchaseInstallment
  @table(name: "purchase_installment")
  @unique(fields: ["purchase", "installmentNumber"])
  @index(fields: ["financialSpaceId", "dueDate", "status"])
  @index(fields: ["invoiceId", "status"]) {
  id: UUID! @default(expr: "uuidV4()")
  financialSpace: FinancialSpace!
  purchase: Purchase!
  invoice: CreditCardInvoice!
  installmentNumber: Int!
  installmentCount: Int!
  amountCents: Int64!
  dueDate: Date!
  status: InstallmentStatus!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type InvoicePayment
  @table(name: "invoice_payment")
  @unique(fields: ["financialSpace", "idempotencyKey"])
  @index(fields: ["invoiceId", "status", "paidAt"]) {
  id: UUID! @default(expr: "uuidV4()")
  financialSpace: FinancialSpace!
  invoice: CreditCardInvoice!
  amountCents: Int64!
  paidAt: Timestamp!
  notes: String @col(dataType: "varchar(1000)")
  status: PaymentStatus!
  idempotencyKey: String! @col(dataType: "varchar(128)")
  createdByUser: UserProfile!
  reversedByUser: UserProfile
  reversedAt: Timestamp
  reversalReason: String @col(dataType: "varchar(500)")
  createdAt: Timestamp! @default(expr: "request.time")
}

type CashFlowRecurrenceSeries
  @table(name: "cash_flow_recurrence_series")
  @unique(fields: ["financialSpace", "idempotencyKey"])
  @index(fields: ["financialSpaceId", "status", "startDate"])
  @index(fields: ["financialSpaceId", "nextOccurrenceDate"]) {
  id: UUID! @default(expr: "uuidV4()")
  financialSpace: FinancialSpace!
  category: Category
  direction: CashFlowDirection!
  kind: CashFlowKind!
  paymentMethod: CashFlowPaymentMethod!
  description: String! @col(dataType: "varchar(180)")
  amountCents: Int64!
  notes: String @col(dataType: "varchar(1000)")
  frequency: CashFlowRecurrenceFrequency!
  startDate: Date!
  endDate: Date
  occurrenceLimit: Int
  preferredDay: Int
  nextOccurrenceDate: Date
  status: CashFlowRecurrenceSeriesStatus!
  idempotencyKey: String! @col(dataType: "varchar(128)")
  createdByUser: UserProfile!
  updatedByUser: UserProfile!
  cancelledByUser: UserProfile
  cancelledAt: Timestamp
  cancellationReason: String @col(dataType: "varchar(500)")
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  version: Int! @default(value: 1)
}

type CashFlowEntry
  @table(name: "cash_flow_entry")
  @unique(fields: ["financialSpace", "idempotencyKey"])
  @unique(fields: ["recurrenceSeries", "occurrenceIndex"])
  @index(fields: ["financialSpaceId", "status", "occurredAt"])
  @index(fields: ["financialSpaceId", "direction", "occurredAt"])
  @index(fields: ["recurrenceSeriesId", "occurredAt", "status"])
  @index(fields: ["sourceType", "sourceEntityId"]) {
  id: UUID! @default(expr: "uuidV4()")
  financialSpace: FinancialSpace!
  category: Category
  direction: CashFlowDirection!
  kind: CashFlowKind!
  paymentMethod: CashFlowPaymentMethod!
  description: String! @col(dataType: "varchar(180)")
  amountCents: Int64!
  occurredAt: Timestamp!
  competenceMonth: Date!
  notes: String @col(dataType: "varchar(1000)")
  status: CashFlowStatus!
  recurrenceSeries: CashFlowRecurrenceSeries
  occurrenceIndex: Int
  isRecurrenceException: Boolean! @default(value: false)
  receivedAt: Timestamp
  paidAt: Timestamp
  sourceType: String @col(dataType: "varchar(40)")
  sourceEntityId: UUID
  idempotencyKey: String! @col(dataType: "varchar(128)")
  createdByUser: UserProfile!
  updatedByUser: UserProfile!
  cancelledByUser: UserProfile
  cancelledAt: Timestamp
  cancellationReason: String @col(dataType: "varchar(500)")
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  version: Int! @default(value: 1)
}

type Loan
  @table(name: "loan")
  @index(fields: ["financialSpaceId", "status"])
  @index(fields: ["financialSpaceId", "firstDueDate"]) {
  id: UUID! @default(expr: "uuidV4()")
  financialSpace: FinancialSpace!
  name: String! @col(dataType: "varchar(160)")
  lender: String @col(dataType: "varchar(160)")
  principalAmountCents: Int64!
  monthlyInterestRateMicros: Int64!
  amortizationMethod: LoanAmortizationMethod!
  installmentCount: Int!
  contractedAt: Date
  firstDueDate: Date!
  expectedInstallmentAmountCents: Int64
  notes: String @col(dataType: "varchar(1000)")
  status: LoanStatus!
  createdByUser: UserProfile!
  updatedByUser: UserProfile!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  cancelledAt: Timestamp
  version: Int! @default(value: 1)
}

type LoanInstallment
  @table(name: "loan_installment")
  @unique(fields: ["loan", "installmentNumber"])
